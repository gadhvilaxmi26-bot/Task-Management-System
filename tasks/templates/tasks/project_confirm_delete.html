{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="card border-danger">
        <div class="card-header bg-danger text-white">
            <h2 class="mb-0">Delete Project</h2>
        </div>
        <div class="card-body">
            <p class="lead">Are you sure you want to delete the project: <strong>"{{ project.name }}"</strong>?</p>
            <p class="text-muted small">Warning: This action cannot be undone and all tasks inside this project might be affected.</p>
            
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete Everything</button>
                <a href="{% url 'project_list' %}" class="btn btn-secondary">No, Go Back</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
