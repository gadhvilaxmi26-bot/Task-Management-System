{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="card border-danger shadow-sm mx-auto" style="max-width: 500px; border-radius: 15px;">
        <div class="card-body text-center p-4">
            <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
            <h3 class="fw-bold mt-3">Delete Project?</h3>
                <p class="text-muted">Are you sure you want to delete "<strong>{{ project.name }}</strong>"?</p>            <form method="post">
                {% csrf_token %}
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-danger rounded-pill">Yes, Delete Everything</button>
                    <a href="{% url 'project_detail' project.pk %}" class="btn btn-light rounded-pill">Cancel</a>                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
