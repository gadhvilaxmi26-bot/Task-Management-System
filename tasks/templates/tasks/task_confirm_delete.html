{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h2>Delete Task</h2>
    <p>Kya aap sach mein task <strong>"{{ task.title }}"</strong> ko delete karna chahte hain?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'project_detail' task.project.id %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
