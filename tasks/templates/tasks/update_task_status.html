{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow" style="max-width: 500px; margin: auto;">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Update Task Status: {{ task.title }}</h5>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label">Current Status</label>
                    {{ form.status }}
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success">Save Changes</button>
                    <a href="{% url 'project_detail' task.project.id %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
