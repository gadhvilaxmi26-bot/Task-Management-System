{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg" style="border-radius: 20px; overflow: hidden;">
                <div class="card-header bg-primary py-4 text-center border-0">
                    <h3 class="fw-bold text-white mb-0"><i class="bi bi-folder-plus me-2"></i>{{ title|default:"Project Details" }}</h3>
                </div>
                <div class="card-body p-4 p-md-5">
                    <form method="post" novalidate>
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="mb-4">
                            <label class="form-label fw-bold text-secondary small">{{ field.label }}</label>
                            <div class="custom-field">
                                {{ field }}
                            </div>
                            {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors }}</div>{% endif %}
                        </div>
                        {% endfor %}

                        <div class="d-grid gap-3 mt-5">
                            <button type="submit" class="btn btn-primary py-2 fw-bold rounded-pill shadow">
                                <i class="bi bi-check-circle me-2"></i>Save Project
                            </button>
                            <a href="{% url 'project_list' %}" class="btn btn-light py-2 rounded-pill border fw-semibold text-muted">
                                <i class="bi bi-arrow-left me-2"></i>Back to List
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    input, select, textarea { 
        display: block; width: 100%; padding: 0.75rem 1rem; 
        font-size: 1rem; color: #334155; background-color: #f8fafc; 
        border: 2px solid #e2e8f0; border-radius: 12px !important;
        transition: 0.3s ease;
    }
    input:focus, select:focus, textarea:focus {
        border-color: #0d6efd; background-color: #fff; outline: none;
        box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
    }
</style>
{% endblock %}
