{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Add Member to: {{ project.name }}</h2>
    <hr>
    <div class="card shadow-sm p-4" style="max-width: 500px;">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="mt-3">
                <button type="submit" class="btn btn-success">Add Member</button>
                <a href="{% url 'project_detail' project.id %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
