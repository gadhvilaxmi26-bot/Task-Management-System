{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="glass-card shadow-lg" style="width: 100%; max-width: 400px;">
        <h2 class="text-center fw-bold mb-4">Welcome Back</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                {{ form.as_p }}
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 mt-3">Login to Dashboard</button>
        </form>
        <div class="text-center mt-4">
            <p class="text-muted small">New here? <a href="{% url 'register' %}" class="text-primary fw-bold text-decoration-none">Create Account</a></p>
        </div>
    </div>
</div>
{% endblock %}
